# Producción en VPS — usa la imagen publicada en GHCR
# Uso: docker compose -f docker-compose.prod.yml up -d
services:
  app:
    image: ghcr.io/joserodriguez92/food-truck-app:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
